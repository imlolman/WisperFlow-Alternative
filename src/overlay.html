<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="icon" href="assets/app-icon.png" type="image/png">
<script>if(navigator.userAgent.includes('Windows'))document.documentElement.classList.add('win');</script>
<style>
html.win, html.win body {
  background: #050a12;
}
html.win .wrap {
  border-radius: 0;
  box-shadow: none;
}
</style>
<style>
* { margin: 0; padding: 0; }
html, body {
  background: transparent;
  overflow: hidden;
  height: 100%;
}
.wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 3px;
  padding: 0 14px;
  position: relative;
  background: linear-gradient(180deg, #0a1524 0%, #050a12 100%);
  border-radius: 13px;
  box-shadow: inset 0 1px 0 rgba(61, 158, 255, 0.12);
}
.bar {
  width: 3px;
  border-radius: 1.5px;
  background: linear-gradient(180deg, #7ec5ff 0%, #3d9eff 50%, #2a7fd4 100%);
  transition: height .07s ease-out;
  height: 4px;
  min-height: 3px;
}
.cross {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(126, 197, 255, 0.55);
  font-size: 10px;
  font-family: -apple-system, sans-serif;
  font-weight: 400;
  display: none;
  cursor: pointer;
  line-height: 1;
  padding: 2px;
}
.cross:hover { color: rgba(200, 230, 255, 0.95); }
#spinner {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 18px;
  height: 18px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="cross" id="cross">&#x2715;</div>
  <svg id="spinner" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <g>
      <g transform="rotate(0 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="-0.917s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
      <g transform="rotate(30 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="-0.833s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
      <g transform="rotate(60 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="-0.75s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
      <g transform="rotate(90 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="-0.667s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
      <g transform="rotate(120 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="-0.583s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
      <g transform="rotate(150 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="-0.5s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
      <g transform="rotate(180 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="-0.417s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
      <g transform="rotate(210 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="-0.333s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
      <g transform="rotate(240 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="-0.25s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
      <g transform="rotate(270 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="-0.167s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
      <g transform="rotate(300 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="-0.083s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
      <g transform="rotate(330 50 50)"><rect fill="#7ec5ff" height="12" width="6" ry="6" rx="3" y="24" x="47"><animate repeatCount="indefinite" begin="0s" dur="1s" keyTimes="0;1" values="1;0" attributeName="opacity"/></rect></g>
    </g>
  </svg>
</div>
<script src="js/overlay.js"></script>
</body>
</html>
