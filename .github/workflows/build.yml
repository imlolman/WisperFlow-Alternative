name: Build & Release macOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          CURRENT=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          COMMITS=$(git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE '^(major|breaking)[:(]'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^(feat|minor)[:(]'; then
            BUMP="minor"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP -> v$NEW_VERSION"

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.version.outputs.version }}" > VERSION
          git add VERSION
          git commit -m "release: v${{ steps.version.outputs.version }}" || true
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD --tags

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app bundle
        run: |
          pyinstaller \
            --name "WisperFlow Alternative" \
            --windowed \
            --noconfirm \
            --add-data "wisperflow/assets:wf_assets" \
            --hidden-import rumps \
            --hidden-import pynput \
            --hidden-import pynput.keyboard \
            --hidden-import pynput.keyboard._darwin \
            --hidden-import pynput.mouse \
            --hidden-import pynput.mouse._darwin \
            --hidden-import whisper \
            --hidden-import sounddevice \
            --hidden-import webview \
            --hidden-import torch \
            --hidden-import numpy \
            --hidden-import wisperflow.onboarding \
            --collect-data whisper \
            --collect-data torch \
            --osx-bundle-identifier com.wisperflow.app \
            wisperflow/__main__.py

          PLIST="dist/WisperFlow Alternative.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :LSUIElement bool true" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :LSUIElement true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'WisperFlow Alternative needs microphone access to transcribe speech.'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'WisperFlow Alternative needs microphone access to transcribe speech.'" "$PLIST"

          cat > dist/entitlements.plist <<'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.device.audio-input</key>
              <true/>
          </dict>
          </plist>
          ENTEOF

          codesign --force --deep --sign - --entitlements dist/entitlements.plist "dist/WisperFlow Alternative.app"
          rm -f dist/entitlements.plist

      - name: Create DMG installer
        run: |
          mkdir -p dist/dmg
          cp -R "dist/WisperFlow Alternative.app" dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create \
            -volname "WisperFlow Alternative" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            "dist/WisperFlow-Alternative-v${{ steps.version.outputs.version }}.dmg"
          rm -rf dist/dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "WisperFlow Alternative v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: "dist/WisperFlow-Alternative-v${{ steps.version.outputs.version }}.dmg"
